name: firmware

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    steps:
      - uses: actions/checkout@v4
      - name: Build firmware for esp32s3
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd firmware
          idf.py set-target esp32s3
          idf.py build

  host_test:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5
    steps:
      - uses: actions/checkout@v4
      - name: Build and run host tests
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          cd firmware/test
          idf.py --preview set-target linux
          idf.py build
          ./build/claude_rlcd_test.elf
